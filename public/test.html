<!DOCTYPE html>
<html>
<head>
    <title>Interactivity Test</title>
</head>
<body style="background: #020617; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
    <h1>Static HTML Test</h1>
    <button id="test-btn" style="padding: 20px 40px; font-size: 24px; background: #9333ea; color: white; border: none; border-radius: 12px; cursor: pointer;">
        Clicked: <span id="count">0</span> times
    </button>
    <script>
        console.log("STATIC TEST SCRIPT STARTING");
        let count = 0;
        const btn = document.getElementById('test-btn');
        const span = document.getElementById('count');
        btn.onclick = () => {
            console.log("STATIC BUTTON CLICKED!");
            count++;
            span.innerText = count;
        };
        window.onclick = (e) => {
            console.log("STATIC WINDOW CLICK:", e.target.tagName);
        };
    </script>
</body>
</html>
